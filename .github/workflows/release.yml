name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        
      - name: Build APK
        run: ./gradlew assembleRelease
        
      - name: Rename APK
        run: mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/yuwanadev-mdm-${{ github.ref_name }}.apk
        
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/yuwanadev-mdm-${{ github.ref_name }}.apk
          generate_release_notes: true
