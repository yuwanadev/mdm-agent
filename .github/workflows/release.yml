name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Make gradlew executable
        run: chmod +x ./gradlew
        
      - name: Decode Keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "Decoding release keystore..."
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > ${{ github.workspace }}/release.jks
          fi
        
      - name: Build APK
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease
        
      - name: Verify and Rename APK
        run: |
          # Locate apksigner in Android SDK build-tools
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools -name apksigner | sort -r | head -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "Error: apksigner not found!"
            exit 1
          fi
          
          # Verify the release APK exists
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Error: release APK not found at $APK_PATH"
            exit 1
          fi
          
          # Verify APK signature
          echo "Verifying APK signature..."
          $APKSIGNER_PATH verify --verbose "$APK_PATH"
          
          # Safely rename the APK matching the extension
          mv "$APK_PATH" "app/build/outputs/apk/release/yuwanadev-mdm-${{ github.ref_name }}.apk"
          
      - name: Cleanup Keystore
        if: always()
        run: |
          if [ -f "${{ github.workspace }}/release.jks" ]; then
            echo "Securely removing release keystore..."
            rm -f "${{ github.workspace }}/release.jks"
          fi
          
      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/yuwanadev-mdm-${{ github.ref_name }}.apk
          generate_release_notes: true
